name: QuickEvent
options:
  bundleIdPrefix: com.quickevent
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: QuickEvent
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.quickevent.app
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_FILE: QuickEvent/Info.plist
    CODE_SIGN_ENTITLEMENTS: QuickEvent/QuickEvent.entitlements

targets:
  QuickEvent:
    type: application
    platform: macOS
    sources:
      - QuickEvent
    settings:
      base:
        INFOPLIST_FILE: QuickEvent/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickEvent/QuickEvent.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.quickevent.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: QuickEvent/QuickEvent.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
